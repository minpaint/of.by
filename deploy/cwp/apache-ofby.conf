#
# Apache vhost snippet for of.by.
# Paste this block into the custom template for the domain inside CWP.
#

ServerName of.by
ServerAlias www.of.by

Alias /static/ /home/django/webapps/ofby/staticfiles/
Alias /media/ /home/django/webapps/ofby/media/

<Directory /home/django/webapps/ofby/staticfiles>
    Require all granted
</Directory>
<Directory /home/django/webapps/ofby/media>
    Require all granted
</Directory>

ProxyPreserveHost On
ProxyPass /static/ !
ProxyPass /media/ !
ProxyPass / http://127.0.0.1:8021/
ProxyPassReverse / http://127.0.0.1:8021/
