# Локальный nginx-vhost на сервере 192.168.37.10 для ohranatruda.of.by
# По образцу /etc/nginx/sites-enabled/pot.by и gmtby/gmt.by.nginx.conf.
#
# Установка (root):
#   sudo cp /home/django/webapps/ofby/deploy/cwp/ohranatruda.of.by.conf \
#           /etc/nginx/sites-available/ohranatruda.of.by.conf
#   sudo ln -sf /etc/nginx/sites-available/ohranatruda.of.by.conf \
#               /etc/nginx/sites-enabled/ohranatruda.of.by.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# В CWP-панели (192.168.37.55) домен должен проксироваться на 192.168.37.10:80
# (как pot.by), а НЕ на custom-port 8021 — маршрутизацию по домену делает этот nginx.

server {
    listen 80;
    server_name ohranatruda.of.by www.ohranatruda.of.by;

    access_log /var/log/nginx/ohranatruda.of.by-access.log;
    error_log  /var/log/nginx/ohranatruda.of.by-error.log;

    client_max_body_size 50m;

    # Скрытые файлы — запрет
    location ~ /\. {
        deny all;
    }

    # Статика напрямую с диска
    location /static/ {
        alias /home/django/webapps/ofby/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Медиа напрямую с диска
    location /media/ {
        alias /home/django/webapps/ofby/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Остальное — на gunicorn (config.wsgi)
    location / {
        proxy_pass http://192.168.37.10:8021;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Сохраняем исходный протокол от фронт-прокси .55 (там SSL-терминация);
        # $scheme здесь был бы http и затёр бы реальный https.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
    }
}
