<nav class="main-nav sticky-top">
  <div class="container-fluid px-3">
    <div class="nav-inner d-flex align-items-center">
      <a href="{% url 'home' %}" class="nav-home {% if request.path == '/' %}active{% endif %}" aria-label="Главная">
        <i class="bi bi-house-fill"></i>
      </a>

      {% for link in main_nav_links %}
      <a
        href="{{ link.url }}"
        class="nav-item {% if link.category and request.path == link.category.get_absolute_url %}active{% endif %}{% if link.external %} nav-item--forum{% endif %}"
        {% if link.external %}target="_blank" rel="noopener"{% endif %}
      >
        <span>{{ link.title }}</span>
      </a>
      {% endfor %}

      <button class="nav-toggle d-md-none ms-auto" type="button" onclick="document.querySelector('.nav-inner').classList.toggle('nav-open')">
        <i class="bi bi-list"></i>
      </button>
    </div>
  </div>
</nav>
